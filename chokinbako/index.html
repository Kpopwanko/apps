<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>みえる貯金箱</title>
  <link rel="icon" type="image/png" href="./public/assets/wanko-catch.png" />
  <link rel="apple-touch-icon" href="./public/assets/wanko-catch.png" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#f472b6" />
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      background-color: #fff5f7;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      overscroll-behavior: none;
    }
    ::-webkit-scrollbar { display: none; }

    @keyframes coinFly {
      0%   { transform: translate(-50%, 0) scale(1.3); opacity: 1; }
      60%  { opacity: 0.85; }
      100% { transform: translate(-50%, -260px) scale(0.1); opacity: 0; }
    }
    @keyframes coinFall {
      0%   { transform: translateY(-80px) rotate(0deg); opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(600deg); opacity: 0; }
    }
    @keyframes scaleIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    @keyframes fadeInUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .coin-fly {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-size: 1.8rem;
      animation: coinFly 1.3s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
    }
    .coin-fall {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      animation: coinFall linear infinite;
    }
    .scale-in { animation: scaleIn 0.35s ease-out; }
    .fade-in-up { animation: fadeInUp 0.4s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;

// ==============================
// 定数・ユーティリティ
// ==============================
const PIGGY_TYPES = [
  { id: 'pig',       label: 'ぶたさん',  src: './public/assets/chokinbako_pig.png' },
  { id: 'can',       label: '缶',        src: './public/assets/chokinbako_can.png' },
  { id: 'dog',       label: 'わんこ',    src: './public/assets/chokinbako_dog.png' },
  { id: 'gamaguchi', label: 'がま口',    src: './public/assets/chokinbako_gamaguchi.png' },
];

const PIGGY_FALLBACKS = { pig: '🐷', can: '🥫', dog: '🐶', gamaguchi: '👛' };

const fmt = (n) => `¥${Number(n).toLocaleString('ja-JP')}`;

const calcDaysLeft = (targetDate) => {
  const now = new Date(); now.setHours(0,0,0,0);
  const tgt = new Date(targetDate); tgt.setHours(0,0,0,0);
  return Math.max(0, Math.ceil((tgt - now) / 86400000));
};

const getPiggyType = (typeId) =>
  PIGGY_TYPES.find(t => t.id === typeId) ?? PIGGY_TYPES[0];

const PREMIUM_PASSWORD = 'WANKO2026';
const NOTE_URL = 'https://note.com/PLACEHOLDER';

// ==============================
// PremiumModal
// ==============================
function PremiumModal({ onClose, onSuccess }) {
  const [password, setPassword] = useState('');
  const [error, setError] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (password === PREMIUM_PASSWORD) {
      localStorage.setItem('mcb-premium', '1');
      onSuccess();
    } else {
      setError(true);
    }
  };

  return (
    <div style={{
      position:'fixed', inset:0, backgroundColor:'rgba(0,0,0,0.5)',
      display:'flex', alignItems:'center', justifyContent:'center', zIndex:100, padding:'24px'
    }}>
      <div className="scale-in" style={{
        backgroundColor:'white', borderRadius:'20px', padding:'28px',
        width:'100%', maxWidth:'320px'
      }}>
        <div style={{ textAlign:'center', marginBottom:'20px' }}>
          <div style={{ fontSize:'2.5rem', marginBottom:'8px' }}>🐾</div>
          <h2 style={{ fontSize:'1.1rem', fontWeight:'bold', color:'#374151', margin:0 }}>プレミアム版</h2>
        </div>

        <p style={{ fontSize:'0.875rem', color:'#6b7280', textAlign:'center', marginBottom:'20px', lineHeight:1.7 }}>
          パスワードを入力して<br />プレミアム版を解除
        </p>

        <form onSubmit={handleSubmit} style={{ display:'flex', flexDirection:'column', gap:'12px' }}>
          <input
            type="password"
            value={password}
            onChange={e => { setPassword(e.target.value); setError(false); }}
            placeholder="パスワードを入力"
            style={{
              width:'100%', borderRadius:'12px', padding:'12px 16px', fontSize:'0.875rem',
              border:`2px solid ${error ? '#f87171' : '#fce7f3'}`, outline:'none'
            }}
          />
          {error && (
            <p style={{ fontSize:'0.75rem', color:'#f87171', margin:'-4px 0 0', textAlign:'center' }}>
              パスワードが違います
            </p>
          )}
          <button type="submit" style={{
            width:'100%', padding:'13px', borderRadius:'12px', border:'none', cursor:'pointer',
            background:'linear-gradient(135deg, #f9a8c9 0%, #f472b6 100%)',
            color:'white', fontWeight:'bold', fontSize:'0.9rem',
            boxShadow:'0 4px 12px rgba(244,114,182,0.35)'
          }}>
            解除する
          </button>
        </form>

        <div style={{ textAlign:'center', marginTop:'16px' }}>
          <a href={NOTE_URL} target="_blank" rel="noopener noreferrer"
            style={{ fontSize:'0.875rem', color:'#f472b6', textDecoration:'none' }}>
            noteで購入する →
          </a>
        </div>

        <button onClick={onClose} style={{
          display:'block', margin:'12px auto 0', fontSize:'0.75rem', color:'#9ca3af',
          background:'none', border:'none', cursor:'pointer'
        }}>
          キャンセル
        </button>
      </div>
    </div>
  );
}

// ==============================
// CreateModal
// ==============================
function CreateModal({ onClose, onCreate }) {
  const [name, setName] = useState('');
  const [type, setType] = useState('pig');
  const [targetAmount, setTargetAmount] = useState('');
  const [targetDate, setTargetDate] = useState('');
  const today = new Date().toISOString().slice(0, 10);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!name.trim() || !targetAmount || !targetDate) return;
    onCreate({ name: name.trim(), type, targetAmount, targetDate });
  };

  return (
    <div style={{
      position:'fixed', inset:0, backgroundColor:'rgba(0,0,0,0.5)',
      display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:50
    }}>
      <div className="scale-in" style={{
        backgroundColor:'white', width:'100%', maxWidth:'420px',
        borderRadius:'24px 24px 0 0', padding:'24px', maxHeight:'92vh', overflowY:'auto'
      }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'20px' }}>
          <span style={{ fontWeight:'bold', fontSize:'1.1rem', color:'#374151' }}>新しい貯金箱を作る</span>
          <button onClick={onClose} style={{
            width:32, height:32, borderRadius:'50%', backgroundColor:'#f3f4f6',
            color:'#9ca3af', fontSize:'1.1rem', display:'flex', alignItems:'center', justifyContent:'center',
            border:'none', cursor:'pointer'
          }}>×</button>
        </div>

        <form onSubmit={handleSubmit} style={{ display:'flex', flexDirection:'column', gap:'20px' }}>
          {/* 名前 */}
          <div>
            <label style={{ display:'block', fontSize:'0.875rem', fontWeight:'bold', color:'#4b5563', marginBottom:'6px' }}>
              貯金箱の名前
            </label>
            <input
              type="text" value={name} onChange={e => setName(e.target.value)}
              placeholder="例：BTSコン遠征費" maxLength={20} required
              style={{
                width:'100%', borderRadius:'12px', padding:'10px 16px', fontSize:'0.875rem',
                border:`2px solid ${name ? '#f472b6' : '#fce7f3'}`, outline:'none'
              }}
            />
          </div>

          {/* 種類 */}
          <div>
            <label style={{ display:'block', fontSize:'0.875rem', fontWeight:'bold', color:'#4b5563', marginBottom:'8px' }}>
              貯金箱の種類
            </label>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'8px' }}>
              {PIGGY_TYPES.map(t => (
                <button key={t.id} type="button" onClick={() => setType(t.id)} style={{
                  display:'flex', flexDirection:'column', alignItems:'center', padding:'8px',
                  borderRadius:'12px', border:`2px solid ${type === t.id ? '#f472b6' : '#fce7f3'}`,
                  backgroundColor: type === t.id ? '#fdf2f8' : 'white', cursor:'pointer', transition:'all 0.15s'
                }}>
                  <PiggyImg typeObj={t} size={48} />
                  <span style={{ fontSize:'0.7rem', color:'#6b7280', marginTop:'4px' }}>{t.label}</span>
                </button>
              ))}
            </div>
          </div>

          {/* 目標金額 */}
          <div>
            <label style={{ display:'block', fontSize:'0.875rem', fontWeight:'bold', color:'#4b5563', marginBottom:'6px' }}>
              目標金額（円）
            </label>
            <input
              type="number" value={targetAmount} onChange={e => setTargetAmount(e.target.value)}
              placeholder="例：50000" min="1" max="9999999" required
              style={{
                width:'100%', borderRadius:'12px', padding:'10px 16px', fontSize:'0.875rem',
                border:`2px solid ${targetAmount ? '#f472b6' : '#fce7f3'}`, outline:'none'
              }}
            />
          </div>

          {/* 目標日 */}
          <div>
            <label style={{ display:'block', fontSize:'0.875rem', fontWeight:'bold', color:'#4b5563', marginBottom:'6px' }}>
              目標日
            </label>
            <input
              type="date" value={targetDate} onChange={e => setTargetDate(e.target.value)}
              min={today} required
              style={{
                width:'100%', borderRadius:'12px', padding:'10px 16px', fontSize:'0.875rem',
                border:`2px solid ${targetDate ? '#f472b6' : '#fce7f3'}`, outline:'none'
              }}
            />
          </div>

          <button type="submit" style={{
            width:'100%', padding:'14px', borderRadius:'12px',
            backgroundColor:'#f472b6', color:'white', fontWeight:'bold', fontSize:'1rem',
            border:'none', cursor:'pointer', boxShadow:'0 4px 12px rgba(244,114,182,0.4)'
          }}>
            作成する 🐷
          </button>
        </form>
      </div>
    </div>
  );
}

// ==============================
// PiggyImg (画像 or 絵文字フォールバック)
// ==============================
function PiggyImg({ typeObj, size = 96 }) {
  const [err, setErr] = useState(false);
  if (err) {
    return (
      <span style={{ fontSize: size * 0.6 + 'px', lineHeight: '1' }}>
        {PIGGY_FALLBACKS[typeObj.id] ?? '🐷'}
      </span>
    );
  }
  return (
    <img
      src={typeObj.src}
      alt={typeObj.label}
      width={size}
      height={size}
      style={{ objectFit:'contain', width:size+'px', height:size+'px' }}
      onError={() => setErr(true)}
    />
  );
}

// ==============================
// SavingsScreen
// ==============================
function SavingsScreen({ bank, todayAmt, onAdd, onDeposit, onAfterDeposit, onCalendar, onBack, onHowTo, onHome, onHistory }) {
  const [animating, setAnimating] = useState(false);
  const [coins, setCoins] = useState([]);
  const buttonRef = useRef(null);
  const timerRef = useRef(null);

  useEffect(() => () => { if (timerRef.current) clearTimeout(timerRef.current); }, []);

  const type = getPiggyType(bank.type);
  const progress = Math.min(100, Math.round((bank.currentAmount / bank.targetAmount) * 100));
  const remaining = Math.max(0, bank.targetAmount - bank.currentAmount);
  const days = calcDaysLeft(bank.targetDate);
  const dailyNeeded = days > 0 ? Math.ceil(remaining / days) : remaining;

  const handleDeposit = () => {
    if (animating || todayAmt === 0) return;
    setAnimating(true);
    const rect = buttonRef.current?.getBoundingClientRect();
    const cx = rect ? rect.left + rect.width / 2 : window.innerWidth / 2;
    const cy = rect ? rect.top + rect.height / 2 : window.innerHeight * 0.55;
    setCoins(Array.from({ length: 8 }, (_, i) => ({
      id: i,
      x: cx + (Math.random() - 0.5) * 90,
      y: cy,
      delay: i * 0.07,
    })));
    timerRef.current = setTimeout(() => {
      const achieved = onDeposit();
      setCoins([]);
      setAnimating(false);
      onAfterDeposit(achieved);
    }, 1400);
  };

  return (
    <div style={{ minHeight:'100vh', backgroundColor:'#fff5f7', paddingBottom:'96px' }}>
      {/* ヘッダー */}
      <div style={{
        backgroundColor:'white', padding:'12px 16px', display:'flex', alignItems:'center',
        gap:'8px', boxShadow:'0 1px 4px rgba(0,0,0,0.08)', position:'sticky', top:0, zIndex:20
      }}>
        <button onClick={onBack} style={{ fontSize:'1.5rem', color:'#9ca3af', background:'none', border:'none', cursor:'pointer', padding:'0 4px' }}>←</button>
        <span style={{ flex:1, textAlign:'center', fontWeight:'bold', color:'#374151', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{bank.name}</span>
        <button onClick={onHowTo} style={{
          fontSize:'0.75rem', padding:'4px 12px', borderRadius:'999px',
          border:'1.5px solid #f9a8c9', color:'#f9a8c9', background:'none', cursor:'pointer', flexShrink:0
        }}>使い方</button>
      </div>

      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', padding:'24px 16px 0' }}>
        {/* 貯金箱画像 */}
        <PiggyImg typeObj={type} size={160} />

        {/* 今日の貯金 */}
        <p style={{ marginTop:'16px', fontSize:'1.1rem', fontWeight:'bold', color:'#4b5563' }}>
          今日の貯金：<span style={{ color:'#f472b6' }}>{fmt(todayAmt)}</span>
        </p>

        {/* 入れるボタン */}
        <button
          ref={buttonRef}
          onClick={handleDeposit}
          disabled={animating || todayAmt === 0}
          style={{
            marginTop:'12px', width:'176px', padding:'12px', borderRadius:'16px',
            backgroundColor: (animating || todayAmt === 0) ? '#fba8cc' : '#f472b6',
            color:'white', fontWeight:'bold', fontSize:'1.1rem', border:'none',
            cursor: (animating || todayAmt === 0) ? 'not-allowed' : 'pointer',
            boxShadow:'0 4px 12px rgba(244,114,182,0.35)', opacity: todayAmt === 0 ? 0.5 : 1
          }}
        >
          入れる 💰
        </button>

        {/* 金額ボタン */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginTop:'20px', width:'100%', maxWidth:'280px' }}>
          {[100, 500, 1000, 5000].map(amt => (
            <button key={amt} onClick={() => onAdd(amt)} disabled={animating} style={{
              padding:'12px', borderRadius:'12px', backgroundColor:'#fce7f3',
              color:'#f472b6', fontWeight:'bold', fontSize:'1.05rem', border:'none',
              cursor: animating ? 'not-allowed' : 'pointer'
            }}>
              +{amt.toLocaleString('ja-JP')}
            </button>
          ))}
        </div>

        {/* 統計カード */}
        <div style={{
          marginTop:'24px', width:'100%', maxWidth:'280px', backgroundColor:'white',
          borderRadius:'16px', padding:'16px', boxShadow:'0 2px 8px rgba(0,0,0,0.06)'
        }}>
          {[
            { label:'目標', value: fmt(bank.targetAmount) },
            { label:'現在', value: fmt(bank.currentAmount), color:'#f472b6' },
            { label:'残り', value: fmt(remaining) },
          ].map(row => (
            <div key={row.label} style={{ display:'flex', justifyContent:'space-between', marginBottom:'4px', fontSize:'0.875rem', color:'#4b5563' }}>
              <span>{row.label}</span>
              <span style={{ fontWeight:'bold', color: row.color ?? undefined }}>{row.value}</span>
            </div>
          ))}
          {/* プログレスバー */}
          <div style={{ width:'100%', height:'12px', backgroundColor:'#fce7f3', borderRadius:'999px', marginTop:'12px' }}>
            <div style={{
              height:'12px', borderRadius:'999px', backgroundColor:'#f9a8c9',
              width:`${progress}%`, transition:'width 0.7s ease'
            }} />
          </div>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:'4px' }}>
            <span style={{ fontSize:'0.7rem', color:'#9ca3af' }}>{fmt(bank.currentAmount)} / {fmt(bank.targetAmount)}</span>
            <span style={{ fontSize:'0.875rem', fontWeight:'bold', color:'#f472b6' }}>{progress}%</span>
          </div>
          <p style={{ textAlign:'center', fontSize:'0.75rem', color:'#6b7280', marginTop:'8px' }}>
            目標日まで <b style={{ color:'#374151' }}>{days}日</b>　・　1日あたり <b style={{ color:'#f472b6' }}>{fmt(dailyNeeded)}</b>
          </p>
        </div>

        {/* カレンダーボタン */}
        <button onClick={onCalendar} style={{
          marginTop:'20px', padding:'10px 24px', borderRadius:'12px',
          backgroundColor:'#fce7f3', color:'#f472b6', fontWeight:'600', fontSize:'0.875rem',
          border:'none', cursor:'pointer'
        }}>
          📅 カレンダーを見る
        </button>
      </div>

      {/* ボトムナビ */}
      <div style={{ position:'fixed', bottom:0, left:0, right:0, backgroundColor:'white', borderTop:'1px solid #fce7f3', display:'flex', zIndex:20 }}>
        <button onClick={onHome} style={{ flex:1, padding:'12px', display:'flex', flexDirection:'column', alignItems:'center', gap:'2px', border:'none', backgroundColor:'transparent', cursor:'pointer', color:'#9ca3af' }}>
          <span style={{ fontSize:'1.25rem' }}>🏠</span>
          <span style={{ fontSize:'0.75rem' }}>ホーム</span>
        </button>
        <button onClick={onHistory} style={{ flex:1, padding:'12px', display:'flex', flexDirection:'column', alignItems:'center', gap:'2px', border:'none', backgroundColor:'transparent', cursor:'pointer', color:'#9ca3af' }}>
          <span style={{ fontSize:'1.25rem' }}>🏆</span>
          <span style={{ fontSize:'0.75rem' }}>達成履歴</span>
        </button>
      </div>

      {/* コインアニメーション */}
      {coins.map(coin => (
        <span key={coin.id} className="coin-fly" style={{ left:`${coin.x}px`, top:`${coin.y}px`, animationDelay:`${coin.delay}s` }}>
          💰
        </span>
      ))}
    </div>
  );
}

// ==============================
// CalendarScreen
// ==============================
const WEEKDAYS = ['月','火','水','木','金','土','日'];

function CalendarScreen({ bank, onBack, onHome, onHistory }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth() + 1);

  const prevMonth = () => { if (month === 1) { setYear(y => y-1); setMonth(12); } else setMonth(m => m-1); };
  const nextMonth = () => { if (month === 12) { setYear(y => y+1); setMonth(1); } else setMonth(m => m+1); };

  const firstDay = new Date(year, month - 1, 1);
  const daysInMonth = new Date(year, month, 0).getDate();
  const startDow = (firstDay.getDay() + 6) % 7;

  const monthStr = `${year}-${String(month).padStart(2, '0')}`;
  const recordMap = {};
  bank.records.filter(r => r.date.startsWith(monthStr)).forEach(r => {
    const day = parseInt(r.date.slice(8), 10);
    recordMap[day] = (recordMap[day] ?? 0) + r.amount;
  });
  const monthTotal = Object.values(recordMap).reduce((s, a) => s + a, 0);
  const cells = [...Array(startDow).fill(null), ...Array.from({ length: daysInMonth }, (_, i) => i + 1)];

  return (
    <div style={{ minHeight:'100vh', backgroundColor:'#fff5f7', paddingBottom:'80px' }}>
      <div style={{
        backgroundColor:'white', padding:'12px 16px', display:'flex', alignItems:'center',
        gap:'8px', boxShadow:'0 1px 4px rgba(0,0,0,0.08)', position:'sticky', top:0, zIndex:20
      }}>
        <button onClick={onBack} style={{ fontSize:'1.5rem', color:'#9ca3af', background:'none', border:'none', cursor:'pointer' }}>←</button>
        <span style={{ flex:1, textAlign:'center', fontWeight:'bold', color:'#374151' }}>📅 カレンダー</span>
        <div style={{ width:32 }} />
      </div>

      <div style={{ padding:'16px 12px' }}>
        {/* 月ナビ */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:'24px', marginBottom:'16px' }}>
          <button onClick={prevMonth} style={{ fontSize:'1.5rem', color:'#9ca3af', background:'none', border:'none', cursor:'pointer', width:40, height:40, borderRadius:'50%' }}>＜</button>
          <span style={{ fontWeight:'bold', color:'#374151', width:'112px', textAlign:'center' }}>{year}年{month}月</span>
          <button onClick={nextMonth} style={{ fontSize:'1.5rem', color:'#9ca3af', background:'none', border:'none', cursor:'pointer', width:40, height:40, borderRadius:'50%' }}>＞</button>
        </div>

        {/* 曜日 */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', marginBottom:'4px' }}>
          {WEEKDAYS.map((d, i) => (
            <div key={d} style={{ textAlign:'center', fontSize:'0.75rem', fontWeight:'600', color: i >= 5 ? '#f9a8c9' : '#9ca3af', padding:'4px 0' }}>{d}</div>
          ))}
        </div>

        {/* セル */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'1px', backgroundColor:'#fce7f3', borderRadius:'12px', overflow:'hidden', border:'1px solid #fce7f3' }}>
          {cells.map((day, idx) => {
            const dow = idx % 7;
            return (
              <div key={idx} style={{ backgroundColor:'white', display:'flex', flexDirection:'column', alignItems:'center', padding:'6px 2px', minHeight:'52px' }}>
                {day ? (
                  <>
                    <span style={{ fontSize:'0.75rem', color: dow >= 5 ? '#f9a8c9' : '#6b7280' }}>{day}</span>
                    {recordMap[day] ? (
                      <>
                        <span style={{ fontSize:'1rem', lineHeight:1.2 }}>💰</span>
                        <span style={{ fontSize:'0.55rem', fontWeight:'bold', color:'#f472b6', lineHeight:1.1 }}>
                          {recordMap[day].toLocaleString('ja-JP')}
                        </span>
                      </>
                    ) : null}
                  </>
                ) : null}
              </div>
            );
          })}
        </div>

        {/* 合計 */}
        <div style={{ marginTop:'16px', backgroundColor:'white', borderRadius:'16px', padding:'16px', textAlign:'center', boxShadow:'0 2px 8px rgba(0,0,0,0.06)' }}>

  );
}

// BankCard
// ==============================
function BankCard({ bank, onSelect, onDelete }) {
  const type = getPiggyType(bank.type);
  const progress = Math.min(100, Math.round((bank.currentAmount / bank.targetAmount) * 100));
  const mmdd = bank.targetDate ? bank.targetDate.slice(5).replace('-', '/') : '';

  return (
    <div style={{ backgroundColor:'white', borderRadius:'16px', padding:'12px', position:'relative', boxShadow:'0 2px 8px rgba(0,0,0,0.06)' }}>
      <button onClick={e => { e.stopPropagation(); onDelete(); }} style={{
        position:'absolute', top:8, right:8, width:24, height:24, borderRadius:'50%',
        backgroundColor:'#f3f4f6', color:'#9ca3af', border:'none', cursor:'pointer',
        fontSize:'0.9rem', display:'flex', alignItems:'center', justifyContent:'center', zIndex:10
      }}>×</button>

      <button onClick={onSelect} style={{ width:'100%', display:'flex', flexDirection:'column', alignItems:'center', background:'none', border:'none', cursor:'pointer' }}>
        <PiggyImg typeObj={type} size={96} />
        <p style={{ fontWeight:'bold', fontSize:'0.875rem', marginTop:'8px', color:'#374151', textAlign:'center', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', width:'100%', padding:'0 8px' }}>
          {bank.name}
        </p>
        <p style={{ fontSize:'0.75rem', color:'#9ca3af', marginTop:'4px' }}>{mmdd}まで</p>
        <div style={{ width:'100%', height:'8px', backgroundColor:'#fce7f3', borderRadius:'999px', marginTop:'8px' }}>
          <div style={{ height:'8px', borderRadius:'999px', backgroundColor:'#f9a8c9', width:`${progress}%`, transition:'width 0.5s ease' }} />
        </div>
        <p style={{ fontSize:'0.75rem', fontWeight:'bold', color:'#f472b6', marginTop:'4px' }}>{progress}%</p>
      </button>
    </div>
  );
}

// ==============================
// App (メイン)
// ==============================
function App() {
  const [screen, setScreen] = useState('home');
  const [banks, setBanks] = useState(() => {
    try { const s = localStorage.getItem('mcb-banks'); return s ? JSON.parse(s) : []; }
    catch { return []; }
  });
  const [selId, setSelId] = useState(null);
  const [todayAmt, setTodayAmt] = useState(0);
  const [history, setHistory] = useState(() => {
    try { const s = localStorage.getItem('mcb-history'); return s ? JSON.parse(s) : []; }
    catch { return []; }
  });
  const [createOpen, setCreateOpen] = useState(false);
  const [deleteId, setDeleteId] = useState(null);
  const [achievedData, setAchievedData] = useState(null);
  const [isPremium, setIsPremium] = useState(() => !!localStorage.getItem('mcb-premium'));
  const [showPremiumModal, setShowPremiumModal] = useState(false);

  // localStorage への自動保存
  useEffect(() => {
    try { localStorage.setItem('mcb-banks', JSON.stringify(banks)); } catch {}
  }, [banks]);
  useEffect(() => {
    try { localStorage.setItem('mcb-history', JSON.stringify(history)); } catch {}
  }, [history]);

  const bank = banks.find(b => b.id === selId) ?? null;

  const goto = (sc, id) => {
    if (id !== undefined) setSelId(id);
    setScreen(sc);
    if (sc !== 'savings') setTodayAmt(0);
  };

  const createBank = (form) => {
    if (!isPremium && banks.length >= 1) return;
    if (banks.length >= 20) return;
    setBanks(prev => [...prev, {
      id: `b${Date.now()}`,
      name: form.name, type: form.type,
      targetAmount: Number(form.targetAmount), targetDate: form.targetDate,
      currentAmount: 0, records: [],
    }]);
    setCreateOpen(false);
  };

  const deleteBank = (id) => {
    setBanks(prev => prev.filter(b => b.id !== id));
    setDeleteId(null);
    if (selId === id) { setSelId(null); setScreen('home'); }
  };

  const deposit = () => {
    if (!todayAmt || !selId) return null;
    const today = new Date().toISOString().slice(0, 10);
    let achievedBank = null;
    setBanks(prev => prev.map(b => {
      if (b.id !== selId) return b;
      const newAmt = b.currentAmount + todayAmt;
      const rec = b.records.find(r => r.date === today);
      const newRecs = rec
        ? b.records.map(r => r.date === today ? { ...r, amount: r.amount + todayAmt } : r)
        : [...b.records, { date: today, amount: todayAmt }];
      if (newAmt >= b.targetAmount && b.currentAmount < b.targetAmount) {
        achievedBank = { ...b, currentAmount: newAmt, records: newRecs };
      }
      return { ...b, currentAmount: newAmt, records: newRecs };
    }));
    if (achievedBank) {
      setHistory(prev => [...prev, { id:`h${Date.now()}`, bankName:achievedBank.name, bankType:achievedBank.type, amount:achievedBank.targetAmount, date:today }]);
      setAchievedData(achievedBank);
    }
    return achievedBank;
  };

  // --- 画面ルーティング ---
  if (screen === 'howto') return <HowToScreen onBack={() => setScreen('home')} />;
  if (screen === 'history') return (
    <>
      <HistoryScreen history={history} onBack={() => setScreen('home')} isPremium={isPremium} onUpgrade={() => setShowPremiumModal(true)} />
      {showPremiumModal && <PremiumModal onClose={() => setShowPremiumModal(false)} onSuccess={() => { setIsPremium(true); setShowPremiumModal(false); }} />}
    </>
  );
  if (screen === 'achievement' && achievedData) {
    return <AchievementScreen bank={achievedData} onHome={() => { setScreen('home'); setAchievedData(null); }} />;
  }
  if (screen === 'calendar' && bank) {
    return <CalendarScreen
      bank={bank}
      onBack={() => setScreen('savings')}
      onHome={() => goto('home')}
      onHistory={() => setScreen('history')}
    />;
  }
  if (screen === 'savings' && bank) {
    return <SavingsScreen
      bank={bank} todayAmt={todayAmt}
      onAdd={amt => setTodayAmt(p => p + amt)}
      onDeposit={deposit}
      onAfterDeposit={(achieved) => { setTodayAmt(0); if (achieved) setScreen('achievement'); }}
      onCalendar={() => setScreen('calendar')}
      onBack={() => goto('home')}
      onHowTo={() => setScreen('howto')}
      onHome={() => goto('home')}
      onHistory={() => setScreen('history')}
    />;
  }

  // --- ホーム画面 ---
  return (
    <div style={{ minHeight:'100vh', backgroundColor:'#fff5f7', paddingBottom:'80px' }}>
      {/* ヘッダー */}
      <div style={{
        backgroundColor:'white', padding:'12px 16px', display:'flex', alignItems:'center', justifyContent:'space-between',
        boxShadow:'0 1px 4px rgba(0,0,0,0.08)', position:'sticky', top:0, zIndex:20
      }}>
        <span style={{ fontSize:'1.25rem', fontWeight:'bold', color:'#f472b6' }}>みえる貯金箱</span>
        <button onClick={() => setScreen('howto')} style={{
          fontSize:'0.75rem', padding:'4px 12px', borderRadius:'999px',
          border:'1.5px solid #f9a8c9', color:'#f9a8c9', background:'none', cursor:'pointer'
        }}>使い方</button>
      </div>

      {/* バナー */}
      <div style={{
        margin:'16px 16px 0', backgroundColor:'#fce7f3', borderRadius:'16px',
        display:'flex', alignItems:'center', padding:'12px 16px', overflow:'hidden'
      }}>
        <div style={{ flex:1 }}>
          <p style={{ fontSize:'0.875rem', fontWeight:'bold', color:'#db2777', lineHeight:1.4 }}>わんこのリウルと一緒に貯金🐾</p>
          <p style={{ fontSize:'0.875rem', color:'#f472b6', marginTop:'2px', lineHeight:1.4 }}>次の推しゴトまでに一緒に貯めよう！</p>
        </div>
        <img
          src="./public/assets/wanko.png" alt="わんこ"
          style={{ height:'64px', objectFit:'contain', marginLeft:'12px', flexShrink:0 }}
          onError={e => { e.currentTarget.style.display='none'; }}
        />
      </div>

      {/* グリッド */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', margin:'16px' }}>
        {banks.map(b => (
          <BankCard key={b.id} bank={b} onSelect={() => goto('savings', b.id)} onDelete={() => setDeleteId(b.id)} />
        ))}
        {(isPremium || banks.length === 0) ? (
          <button onClick={() => setCreateOpen(true)} style={{
            backgroundColor:'white', borderRadius:'16px', minHeight:'192px',
            display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
            border:'2px dashed #f9a8c9', cursor:'pointer'
          }}>
            <span style={{ fontSize:'2.5rem', color:'#f9a8c9' }}>＋</span>
            <span style={{ fontSize:'0.875rem', color:'#f9a8c9', marginTop:'8px', fontWeight:'600' }}>新しい貯金箱</span>
          </button>
        ) : banks.length >= 1 ? (
          <button onClick={() => setShowPremiumModal(true)} style={{
            backgroundColor:'white', borderRadius:'16px', minHeight:'192px',
            display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
            border:'2px dashed #f9a8c9', cursor:'pointer', gap:'8px', padding:'16px'
          }}>
            <span style={{ fontSize:'2rem', color:'#f9a8c9' }}>＋</span>
            <span style={{ fontSize:'0.8rem', color:'#f472b6', fontWeight:'600', textAlign:'center', lineHeight:1.5 }}>
              貯金箱は2個以上は<br />プレミアム版で<br />ご利用いただけます🐾
            </span>
          </button>
        ) : null}
      </div>

      {/* ボトムナビ */}
      <div style={{
        position:'fixed', bottom:0, left:0, right:0, backgroundColor:'white',
        borderTop:'1px solid #fce7f3', display:'flex'
      }}>
        <button style={{ flex:1, padding:'12px', display:'flex', flexDirection:'column', alignItems:'center', gap:'2px', border:'none', backgroundColor:'transparent', cursor:'pointer', color:'#f472b6' }}>
          <span style={{ fontSize:'1.25rem' }}>🏠</span>
          <span style={{ fontSize:'0.75rem', fontWeight:'600' }}>ホーム</span>
        </button>
        <button onClick={() => setScreen('history')} style={{ flex:1, padding:'12px', display:'flex', flexDirection:'column', alignItems:'center', gap:'2px', border:'none', backgroundColor:'transparent', cursor:'pointer', color:'#9ca3af' }}>
          <span style={{ fontSize:'1.25rem' }}>🏆</span>
          <span style={{ fontSize:'0.75rem' }}>達成履歴</span>
        </button>
      </div>

      {/* 作成モーダル */}
      {createOpen && <CreateModal onClose={() => setCreateOpen(false)} onCreate={createBank} />}

      {/* プレミアムモーダル */}
      {showPremiumModal && <PremiumModal onClose={() => setShowPremiumModal(false)} onSuccess={() => { setIsPremium(true); setShowPremiumModal(false); }} />}

      {/* 削除確認 */}
      {deleteId && (
        <div style={{ position:'fixed', inset:0, backgroundColor:'rgba(0,0,0,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:50, padding:'24px' }}>
          <div className="scale-in" style={{ backgroundColor:'white', borderRadius:'16px', padding:'24px', width:'100%', maxWidth:'280px' }}>
            <p style={{ textAlign:'center', fontWeight:'600', color:'#374151', marginBottom:'20px' }}>本当に削除しますか？</p>
            <div style={{ display:'flex', gap:'12px' }}>
              <button onClick={() => setDeleteId(null)} style={{
                flex:1, padding:'10px', borderRadius:'12px', border:'1.5px solid #e5e7eb',
                color:'#6b7280', fontWeight:'600', background:'none', cursor:'pointer', fontSize:'0.875rem'
              }}>キャンセル</button>
              <button onClick={() => deleteBank(deleteId)} style={{
                flex:1, padding:'10px', borderRadius:'12px', backgroundColor:'#f87171',
                color:'white', fontWeight:'600', border:'none', cursor:'pointer', fontSize:'0.875rem'
              }}>削除する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
